<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>
        Modo Carreira
    </title> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <article class="dados-jogador">
        <h2>Nome do jogador:</h2>
        <h1>{{ jogador.nome }}</h1>
        <div class="center margin-button">Idade: 
            <input class="dados" type="text" value="{{ 2026 - jogador.idade.year }}" disabled>
        </div>
        <div class="margin-button">
            Jogos: <input class="dados" type="text" value="{{ jogador.jogos}}" disabled>
            Gols: <input class="dados" type="text" value="{{ jogador.gols }}" disabled>
            Assistencias: <input class="dados" type="text" value="{{ jogador.assistencias }}" disabled>
            Numero de Titulos: <input class="dados" type="text" value="{{ jogador.num_titulos }}" disabled>
        </div>        

        <div class="margin-button">
            Hathick: <input class="dados" type="text" value="{{ jogador.hathick }}" disabled>
            Doublehathick: <input class="dados" type="text" value="{{ jogador.doublehathick }}" disabled>
            Pentathick: <input class="dados" type="text" value="{{ jogador.pentathick }}" disabled>
            Hexathick: <input class="dados" type="text" value="{{ jogador.hexathick }}" disabled>
        </div>

        <div class="margin-button">
            <a href="{{ url_for('carregarjogador') }}" class="btn btn-danger">Voltar</a>
            <a href="" class="btn btn-success">Adicionar Temporada</a>
        </div>        
    </article>


</body>
</html>
