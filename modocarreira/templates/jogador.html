<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>
        Modo Carreira
    </title> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form method="POST">
        {{ form.hidden_tag() }}
        <h2>Nome do jogador:</h2>
        <h1>{{ jogador.nome }}</h1>
        <div>Idade: <input type="text" value="{{ jogador.idade }}" disabled></div>
        <div>
            Jogos: <input type="text" value="{{ jogador.jogos}}">
            Gols: <input type="text" value="{{ jogador.gols }}">
            Assistencias: <input type="text" value="{{ jogador.assistencias }}">
        </div>        
    </form>


    <a href="{{ url_for('carregarjogador') }}" class="btn btn-danger">Voltar</a>
</body>
</html>
