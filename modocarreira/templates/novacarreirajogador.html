<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>
        Modo Carreira
    </title> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form method="POST">
        {{ form.hidden_tag() }}
        <h1>Modo Carreira</h1>
        <div class="margin-button">{{ form.nome.label }} {{ form.nome() }}</div>
        <div class="margin-button">{{ form.idade.label }} {{ form.idade() }}</div>
        <a type="submit" class="btn btn-success margin-button">{{ form.botao_confirmacao }}<a> 
        <a href="{{ url_for('carreirajogador') }}" class="btn btn-danger margin-button">Voltar</a>
    </form>
</body>
</html>
